<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Details</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="tm-body">
  <header class="tm-header">
    <div class="tm-header-inner">
      <h1 class="tm-logo">Event Explorer</h1>
    </div>
  </header>

  <main class="tm-main">
    <div class="tm-panel">
      <h2>Event Details</h2>
      <div id="event-details">Loading...</div>
    </div>
  </main>

  <footer class="tm-footer">Powered by Ticketmaster</footer>

  <script>
    async function loadEvent() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const response = await fetch(`/api/ticketmaster?id=${id}`);
      const data = await response.json();

      const container = document.getElementById("event-details");

      container.innerHTML = `
        <h3>${data.name}</h3>
        <p>${data.dates.start.localDate}</p>
        <p>${data._embedded?.venues?.[0]?.name || "Unknown venue"}</p>
        <p>${data.info || ""}</p>
      `;
    }

    loadEvent();
  </script>
</body>
</html>
