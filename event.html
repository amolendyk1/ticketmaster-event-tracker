<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Details</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="tm-body">
  <header class="tm-header">
    <div class="tm-header-inner">
      <h1 class="tm-logo">Event Explorer</h1>
      <nav class="tm-nav">
        <a href="index.html">Back</a>
      </nav>
    </div>
  </header>

  <main class="tm-main tm-main--detail">
    <section class="tm-panel tm-panel--detail">
      <div class="tm-detail-header">
        <h2 id="event-name"></h2>
        <p id="event-date"></p>
        <p id="event-venue"></p>
        <p id="event-location"></p>
      </div>

      <div class="tm-detail-actions">
        <a id="ticket-link" class="tm-button tm-button--primary" target="_blank">
          Buy Tickets
        </a>

        <button id="open-seatmap" class="tm-button">View Seat Map</button>
      </div>
    </section>
  </main>

  <!-- Full-screen modal -->
  <div id="seatmap-modal" class="tm-modal">
    <div class="tm-modal-content">
      <button id="close-seatmap" class="tm-modal-close">Close</button>
      <iframe id="seatmap-frame"></iframe>
    </div>
  </div>

  <script src="event.js"></script>
</body>
</html>
