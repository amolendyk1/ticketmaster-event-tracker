<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ticketmaster Search</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="tm-page">

  <div class="tm-wrapper">
    <div class="tm-card">
      <h2>Search Events</h2>

      <form id="search-form" class="tm-form">
        <label>Keyword</label>
        <input id="search-input" type="text" placeholder="Search artists, teams, venues..." />

        <label>Category</label>
        <select id="category">
          <option value="">All</option>
          <option value="Music">Music</option>
          <option value="Sports">Sports</option>
          <option value="Arts & Theatre">Arts & Theatre</option>
        </select>

        <button type="submit">Search</button>
      </form>

      <p id="status" class="tm-status"></p>
    </div>

    <div class="tm-results-card">
      <h2>Events</h2>
      <div id="events-container" class="tm-events-container"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
