<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ticketmaster Event Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
  <script defer src="events.js"></script>

  <!-- Leaflet Map Library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body class="ticketmaster-page">

<header class="site-header">
  <h1 class="site-title">Ticketmaster Event Tracker</h1>
  <nav class="site-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="ticketmaster.html" class="nav-link">Ticketmaster</a>
  </nav>
</header>

<main>
  <div class="tm-wrapper">

    <div class="tm-card">
      <h2>Search Events</h2>

      <form id="search-form" class="tm-form">
        <input id="search-input" type="text" placeholder="Search concerts, artists, venues..." />
        <button type="submit">Search</button>
      </form>

      <div id="status" class="tm-status"></div>
    </div>

    <div class="tm-results-card">
      <h2>Events</h2>
      <div id="events-container" class="tm-events-container"></div>
    </div>

    <div id="event-map"></div>

  </div>
</main>

<footer class="thin-footer">
  <p>Powered by Ticketmaster API · © 2026 Ally</p>
</footer>

</body>
</html>
