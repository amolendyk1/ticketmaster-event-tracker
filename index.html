<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Explorer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body class="tm-body">
  <header class="tm-header">
    <div class="tm-header-inner">
      <h1 class="tm-logo">Event Explorer</h1>
    </div>
  </header>

  <main class="tm-main tm-main--single">

    <section class="tm-panel tm-panel--search">
      <h2>Find Events Near You</h2>

      <form id="search-form" class="tm-form">
        <div class="tm-form-row">
          <label for="search-input">Keyword (optional)</label>
          <input id="search-input" type="text" placeholder="Noah Kahan, Broadway…" />
        </div>

        <div class="tm-form-row">
          <label for="location-input">Location Filter (optional)</label>
          <input id="location-input" type="text" placeholder="Boston, MA…" />
        </div>

        <div class="tm-form-row">
          <label for="category-select">Event Type</label>
          <select id="category-select">
            <option value="">All Events</option>
            <option value="Music">Concerts</option>
            <option value="Sports">Sports Games</option>
            <option value="Arts & Theatre">Musicals & Theatre</option>
            <option value="Comedy">Comedy Shows</option>
            <option value="Family">Family Events</option>
          </select>
        </div>

        <button type="submit" class="tm-button">Search</button>
      </form>

      <p id="status" class="tm-status"></p>
    </section>

    <section class="tm-panel tm-panel--results">
      <h2>Events</h2>

      <p id="filter-tag" class="tm-filter-tag" style="display:none;"></p>

      <div id="events-container" class="tm-events-grid"></div>
      <button id="load-more" class="tm-button" style="display:none;">Load More</button>
    </section>

    <section class="tm-panel tm-panel--map">
      <h2>Event Map</h2>
      <div id="map" class="tm-map"></div>
    </section>

  </main>

  <footer class="tm-footer">
    Powered by Ticketmaster • Event Explorer © 2026
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
