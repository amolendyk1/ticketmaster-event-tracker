<!DOCTYPE html>
<html lang="en">
<header>
  <meta charset="UTF-8" />
  <title>Ticketmaster Event Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</header>

<body class="ticketmaster-page">

  <!-- HEADER -->
  <header class="site-header">
    <h1 class="site-title">Ticketmaster Event Tracker</h1>
    <nav class="site-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="ai-chat.html" class="nav-link">AI Chat</a>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="tm-wrapper">
    
    <div class="tm-card">
      <h2>Search Events</h2>

      <form id="search-form" class="tm-form">
        <label for="search-input">Search by artist, venue, city, or keyword</label>
        <input id="search-input" type="text" placeholder="e.g. Taylor Swift, Boston, TD Garden" />
        <button type="submit">Search</button>
      </form>

      <div id="status" class="tm-status"></div>
    </div>

    <div class="tm-results-card">
      <h2>Results</h2>
      <div id="events-container" class="tm-events-container"></div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="thin-footer">
    <p>Powered by Ticketmaster Discovery API</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
